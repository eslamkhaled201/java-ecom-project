<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Register - My Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">My Shop</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="/register">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Register Content -->
  <div class="container mt-5">
    <h2 class="mb-4">Register</h2>
    <form th:action="@{/register}" method="post" class="w-50">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-success">Register</button>
    </form>
  </div>
</body>
<!-- Footer -->
<footer class="bg-dark text-light text-center py-3 mt-5">
  <div class="container">
    <p class="mb-0">© 2026 My Shop. All rights reserved.</p>
    <small class="text-muted">Built with Spring Boot & Thymeleaf</small>
  </div>
</footer>

</html>
