<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Shop - Home</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">My Shop</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Home Content -->
  <div class="container mt-5 text-center">
    <div class="p-5 bg-light rounded shadow">
      <h1 class="mb-4 text-primary">Welcome to My Shop</h1>
      <p class="lead">Your one-stop destination for amazing products.</p>
      <a href="/products" class="btn btn-lg btn-success mt-3">Shop Now</a>
    </div>
  </div>
</body>
  <!-- Footer -->
  <footer class="bg-dark text-light text-center py-3 mt-5">
    <div class="container">
      <p class="mb-0">© 2026 My Shop. All rights reserved.</p>
      <small class="text-muted">Built with Spring Boot & Thymeleaf</small>
    </div>
  </footer>

</html>
